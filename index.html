<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GREEN API Test</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    padding: 20px;
    gap: 20px;
  }
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .left input, .left textarea, .left button {
    padding: 8px;
    font-size: 14px;
  }
  .right {
    flex: 1;
  }
  .right textarea {
    width: 100%;
    height: 500px;
    font-family: monospace;
    font-size: 13px;
    padding: 10px;
  }
  button {
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="left">
  <!-- ID и Token -->
  <input id="idInstance" placeholder="idInstance">
  <input id="apiToken" placeholder="ApiTokenInstance">
  <button onclick="getSettings()">getSettings</button>
  <button onclick="getStateInstance()">getStateInstance</button>

  <!-- Send Message -->
  <input id="phoneMsg" placeholder="Телефон (пример: 77071234567)">
  <textarea id="textMsg" placeholder="Сообщение"></textarea>
  <button onclick="sendMessage()">sendMessage</button>

  <!-- Send File -->
  <input id="phoneFile" placeholder="Телефон (пример: 77071234567)">
  <input id="fileUrl" placeholder="Ссылка на файл">
  <input id="fileName" placeholder="Имя файла">
  <button onclick="sendFileByUrl()">sendFileByUrl</button>
</div>

<div class="right">
  <textarea id="response" readonly placeholder="Ответ"></textarea>
</div>

<script>
  function show(data) {
    document.getElementById("response").value = JSON.stringify(data, null, 2);
  }

  function getUrl(method) {
    const id = document.getElementById("idInstance").value;
    const token = document.getElementById("apiToken").value;
    return `https://api.green-api.com/waInstance${id}/${method}/${token}`;
  }

  async function getSettings() {
    const res = await fetch(getUrl("getSettings"));
    const data = await res.json();
    show(data);
  }

  async function getStateInstance() {
    const res = await fetch(getUrl("getStateInstance"));
    const data = await res.json();
    show(data);
  }

  async function sendMessage() {
    const phone = document.getElementById("phoneMsg").value;
    const message = document.getElementById("textMsg").value;
    const res = await fetch(getUrl("sendMessage"), {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ chatId: phone + "@c.us", message })
    });
    const data = await res.json();
    show(data);
  }

  async function sendFileByUrl() {
    const phone = document.getElementById("phoneFile").value;
    const url = document.getElementById("fileUrl").value;
    const name = document.getElementById("fileName").value;
    const res = await fetch(getUrl("sendFileByUrl"), {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ chatId: phone + "@c.us", urlFile: url, fileName: name })
    });
    const data = await res.json();
    show(data);
  }
</script>

</body>
</html>
