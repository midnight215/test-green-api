<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GREEN API Test</title>
<style>
  body { font-family: Arial; display: flex; gap: 20px; padding: 20px; }
  .left { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  input, textarea, button { padding: 8px; font-size: 14px; }
  .right textarea { width: 100%; height: 500px; font-family: monospace; font-size: 13px; padding: 10px; }
  button { cursor: pointer; }
</style>
</head>
<body>

<div class="left">
  <input id="idInstance" placeholder="idInstance">
  <input id="apiToken" placeholder="ApiTokenInstance">
  <button onclick="callApi('getSettings')">getSettings</button>
  <button onclick="callApi('getStateInstance')">getStateInstance</button>

  <input id="phoneMsg" placeholder="Телефон (пример: 77071234567)">
  <textarea id="textMsg" placeholder="Сообщение"></textarea>
  <button onclick="sendMessage()">sendMessage</button>

  <input id="phoneFile" placeholder="Телефон (пример: 77071234567)">
  <input id="fileUrl" placeholder="Ссылка на файл">
  <input id="fileName" placeholder="Имя файла">
  <button onclick="sendFile()">sendFileByUrl</button>
</div>

<div class="right">
  <textarea id="response" readonly placeholder="Ответ"></textarea>
</div>

<script>
function show(data) {
  document.getElementById("response").value = JSON.stringify(data, null, 2);
}

function getUrl(method) {
  const id = document.getElementById("idInstance").value;
  const token = document.getElementById("apiToken").value;
  return `https://api.green-api.com/waInstance${id}/${method}/${token}`;
}

async function callApi(method, body=null) {
  try {
    const res = await fetch(getUrl(method), body ? {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    } : { method: "GET" });

    const data = await res.json();
    show(data);
  } catch(err) {
    show({ error: err.message });
  }
}

function sendMessage() {
  const phone = document.getElementById("phoneMsg").value;
  const message = document.getElementById("textMsg").value;
  if (!phone || !message) return alert("Введите номер и сообщение");
  callApi('sendMessage', { chatId: phone+'@c.us', message });
}

function sendFile() {
  const phone = document.getElementById("phoneFile").value;
  const url = document.getElementById("fileUrl").value;
  const name = document.getElementById("fileName").value;
  if (!phone || !url || !name) return alert("Заполните все поля");
  callApi('sendFileByUrl', { chatId: phone+'@c.us', urlFile: url, fileName: name });
}
</script>

</body>
</html>
